<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Custom Highlight API Demos</title>
    <link rel="stylesheet" href="./base.css">
    <style>
    main {
      max-width: 720px;
      padding: 40px 24px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 24px;
    }
    ul {
      list-style: none;
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 16px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
    }
    a:hover {
      background-color: #f5f5f5;
    }
    .demo-title {
      font-weight: bold;
    }
    .demo-desc {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    </style>
  </head>
  <body>
    <main>
      <h1>CSS Custom Highlight API Demos</h1>
      <ul>
        <li>
          <a href="./01_basic/">
            <div class="demo-title">01. Basic</div>
            <div class="demo-desc">CSS Custom Highlight API の最小サンプル</div>
          </a>
        </li>
        <li>
          <a href="./02_search/">
            <div class="demo-title">02. Search</div>
            <div class="demo-desc">
              入力された文字列にマッチする箇所をハイライト
            </div>
          </a>
        </li>
        <li>
          <a href="./03_correction/">
            <div class="demo-title">03. Proofreading</div>
            <div class="demo-desc">校正候補の箇所をハイライト</div>
          </a>
        </li>
        <li>
          <a href="./04_heatmap/">
            <div class="demo-title">04. Sentiment heatmap</div>
            <div class="demo-desc">
              AIで分析した感情スコアを色別にハイライトした例
            </div>
          </a>
        </li>
        <li>
          <a href="./05_list/">
            <div class="demo-title">05. List</div>
            <div class="demo-desc">リスト内のハイライト例</div>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
