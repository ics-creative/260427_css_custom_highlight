<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Custom Highlight API | Proofreading</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Proofreading Highlighter</h1>
        <p class="description">
          校正ルールに反する箇所を、プレビュー内でハイライトします。
        </p>
      </header>

      <section class="editor-area">
        <label class="editor-label" for="editor">文章を入力</label>
        <textarea class="editor" id="editor" rows="8" spellcheck="false">
          This feature is very useful and it is really just amazing.
          サンプル文章です。ﾊﾝｶｸｶﾅも検出されます。ＡＢＣ１２３
          のような全角英数字も検出します。これは便利だと思います。
        </textarea>

        <h2 class="preview-heading">Preview</h2>
        <p class="preview"></p>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
